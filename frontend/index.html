<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraveQuest - Find Great Food</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">🍽️</span>
            <span class="logo-text">CraveQuest</span>
        </div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">Cities</a>
            <a href="#">About Us</a>
        </nav>
        <button class="btn-primary login-btn">Login / Sign Up</button>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">Welcome To Find <br>Restaurants</h1>

                <div class="stats-container" style="gap: 20px; align-items: center;">
                    <div class="stat-item" style="flex-direction: row; gap: 8px;">
                        <span class="stat-icon" style="font-size: 1.5rem;">🥗</span>
                        <span class="stat-label">Fresh Ingredients</span>
                    </div>
                    <div class="stat-item" style="flex-direction: row; gap: 8px;">
                        <span class="stat-icon" style="font-size: 1.5rem;">🔥</span>
                        <span class="stat-label">Hot & Spicy</span>
                    </div>
                    <div class="stat-item" style="flex-direction: row; gap: 8px;">
                        <span class="stat-icon" style="font-size: 1.5rem;">🧁</span>
                        <span class="stat-label">Sweet Desserts</span>
                    </div>
                </div>

                <div class="search-box">
                    <form id="recommend-form">

                        <div class="input-group">
                            <label for="place">Location</label>
                            <select id="place" name="place">
                                <option value="">Loading locations...</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Cuisines</label>
                            <div class="custom-dropdown" id="cuisines-dropdown">
                                <div class="dropdown-selected" id="cuisines-selected">Any Cuisine</div>
                                <div class="dropdown-list" id="cuisines-list" style="display: none;">
                                    <!-- populated via JS -->
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="price_category">Price Category</label>
                            <select id="price_category" name="price_category">
                                <option value="Any">Any</option>
                                <option value="low">Low (<= 500)</option>
                                <option value="medium">Medium (500 - 1000)</option>
                                <option value="high">High (> 1000)</option>
                            </select>
                        </div>

                        <div class="input-group rating-group">
                            <label for="min_rating">Min Rating: <span id="rating-val">4.0</span></label>
                            <input type="range" id="min_rating" name="min_rating" min="1" max="5" step="0.1"
                                value="4.0">
                        </div>

                        <button type="submit" class="btn-primary search-btn" id="submit-btn">Search Now</button>
                    </form>
                </div>
            </div>

            <div class="hero-image">
                <!-- Decorative element masking the hero background -->
                <div class="hero-overlay"></div>
            </div>
        </section>

        <section class="results-section" id="results-section">
            <div class="results-header" id="results-header" style="display: none;">
                <h2>What Our AI Recommends</h2>
                <!-- Explanation text removed per user request -->
            </div>

            <div class="loading-state" id="loading-state" style="display: none;">
                <div class="spinner"></div>
                <p>Curating the perfect options for you...</p>
            </div>

            <div class="error-state" id="error-state" style="display: none;">
                <div class="error-card">
                    <span class="error-emoji">😕</span>
                    <h3>No Recommendations Found</h3>
                    <p id="error-message">Try relaxing your filters to see more results.</p>
                </div>
            </div>

            <div class="cards-grid" id="recommendations-grid">
                <!-- Cards injected via JS -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
